name: Deploy Smoke Test

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Deployed app URL (include https://)"
        required: true
        default: "https://bac-tracker-web-k0qa.onrender.com"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run deploy smoke test
        run: python scripts/smoke_deploy.py --base-url "${{ github.event.inputs.base_url }}"

